<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeMajordome — Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      background:#07070f;
      background-image: radial-gradient(ellipse at 50% 30%, rgba(201,168,76,0.09), transparent 60%);
      font-family:'Inter',sans-serif; color:#f0ece4;
    }
    .card {
      background:#0d0d1a; border:1px solid rgba(201,168,76,0.18);
      border-radius:24px; padding:3rem 2.5rem; width:340px; text-align:center;
      box-shadow:0 0 80px rgba(201,168,76,0.1), 0 20px 60px rgba(0,0,0,0.5);
    }
    .logo { font-family:'Playfair Display',serif; font-size:1.8rem; font-weight:700; color:#c9a84c; margin-bottom:0.3rem; }
    .sub  { color:#7a7060; font-size:0.78rem; letter-spacing:0.12em; text-transform:uppercase; margin-bottom:2.5rem; }
    .btn-discord {
      display:flex; align-items:center; justify-content:center; gap:0.75rem;
      background:#5865F2; color:#fff; padding:0.9rem 1.5rem;
      border-radius:12px; font-weight:600; font-size:0.95rem;
      text-decoration:none; transition:all 0.2s; width:100%;
      box-shadow:0 4px 20px rgba(88,101,242,0.35);
    }
    .btn-discord:hover { background:#4752c4; transform:translateY(-2px); }
    .btn-discord svg { width:20px; height:20px; flex-shrink:0; }
    .err { margin-top:1.2rem; color:#f87171; font-size:0.82rem; background:rgba(248,113,113,0.08); border-radius:8px; padding:0.6rem 0.8rem; display:none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Le Majordome</div>
    <div class="sub">Panneau d'administration</div>
    <a class="btn-discord" href="/auth/login">
      <svg viewBox="0 0 71 55" fill="white"><path d="M60.1 4.9A58.5 58.5 0 0 0 45.4.8a40.8 40.8 0 0 0-1.8 3.7 54 54 0 0 0-16.2 0A39 39 0 0 0 25.6.8 58.4 58.4 0 0 0 10.9 4.9C1.6 18.7-1 32.1.3 45.4a58.9 58.9 0 0 0 17.9 9 44.3 44.3 0 0 0 3.8-6.2 38.3 38.3 0 0 1-6-2.9l1.5-1.1a41.9 41.9 0 0 0 35.9 0l1.5 1.1a38.2 38.2 0 0 1-6 2.9 44 44 0 0 0 3.8 6.2 58.7 58.7 0 0 0 17.9-9C72 29.8 68.6 16.4 60.1 4.9ZM23.8 37.3c-3.5 0-6.4-3.2-6.4-7.2s2.8-7.2 6.4-7.2 6.5 3.2 6.4 7.2c0 4-2.8 7.2-6.4 7.2Zm23.4 0c-3.5 0-6.4-3.2-6.4-7.2s2.8-7.2 6.4-7.2 6.5 3.2 6.4 7.2c0 4-2.8 7.2-6.4 7.2Z"/></svg>
      Se connecter avec Discord
    </a>
    <div class="err" id="err"></div>
  </div>
  <script>
    const e = new URLSearchParams(location.search).get('error');
    if (e) { const d = document.getElementById('err'); d.textContent = 'Connexion refusée ou échouée. Réessaie.'; d.style.display='block'; }
  </script>
</body>
</html>
